<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Phillip Kaluba — Developer portfolio">
    <title>Phillip Kaluba</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <script src="./script.js" defer></script>
</head>

<body>
    <div class="page-bg" aria-hidden="true"></div>

    <main class="container">
        <article class="profile-card">
            <header class="profile-header">
                <div class="avatar-wrap">
                    <img src="" alt="" id="professionalImage" class="avatar">
                    <span class="avatar-ring" aria-hidden="true"></span>
                </div>
                <div class="header-text">
                    <p class="eyebrow">Portfolio</p>
                    <h1 class="proName" id="professionalName">Loading…</h1>
                </div>
            </header>

            <section class="intro">
                <h2 class="intro-title">
                    <a href="" target="_blank" rel="noopener noreferrer" id="nameLink" class="name-link"></a>
                    <span id="primaryDescription" class="role-text"></span>
                </h2>
            </section>

            <section class="highlights">
                <div class="highlight-card">
                    <i class="fa-solid fa-code highlight-icon" aria-hidden="true"></i>
                    <p id="workDescription1"></p>
                </div>
                <div class="highlight-card">
                    <i class="fa-solid fa-server highlight-icon" aria-hidden="true"></i>
                    <p id="workDescription2"></p>
                </div>
            </section>

            <section class="connect">
                <h3 id="linkTitleText" class="connect-title"></h3>
                <ul class="social-links">
                    <li>
                        <a href="" target="_blank" rel="noopener noreferrer" id="linkedInLink" class="social-btn linkedin">
                            <i class="fa-brands fa-linkedin" aria-hidden="true"></i>
                            <span class="social-label"></span>
                        </a>
                    </li>
                    <li>
                        <a href="" target="_blank" rel="noopener noreferrer" id="githubLink" class="social-btn github">
                            <i class="fa-brands fa-github" aria-hidden="true"></i>
                            <span class="social-label"></span>
                        </a>
                    </li>
                </ul>
            </section>

            <footer class="profile-footer">
                <p id="contactText"></p>
            </footer>
        </article>
    </main>
</body>

</html>
